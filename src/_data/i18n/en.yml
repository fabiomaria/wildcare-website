programm:
  meta:
    title: "Programme — Wild Care | Graz"
    description: "Contact Improvisation every Monday in Graz. Open workshop on a donation basis — for everyone, with or without prior experience."
  hero:
    eyebrow: "Programme"
    heading: "Movement as Encounter."
    intro: "Our offerings combine bodywork, social practice and artistic exploration — open to anyone who is curious."
  montagskurs:
    section_label: "Our Core Format"
    section_heading: "Monday Class"
    card_title: "At a Glance"
    row_was_label: "What"
    row_was_value: "Contact Improvisation — open workshop"
    row_wann_label: "When"
    row_wann_value: "Every Monday, 17:45 – 19:15"
    row_wo_label: "Where"
    row_kosten_label: "Cost"
    row_kosten_value: "Donation-based"
    row_fuer_label: "For"
    row_fuer_value: "Everyone — with or without prior experience"
    btn_anmelden: "Sign up now"
    btn_mehr: "Learn more"
    desc_heading: "What to Expect"
    desc_p1: "Contact Improvisation is the playful exploration of gravity, balance and touch. There are no fixed steps, no choreography and no pressure to perform — just you, the space and the people in it."
    desc_p2: "You learn to share and release weight, to listen through touch and to become more aware of your body. Along the way, you naturally regulate your nervous system, practise communicating boundaries and develop a fine sense for yourself and those around you."
    desc_p3: "Each session begins with a guided warm-up and flows into an open jam — a free dance time where anything can happen: stillness, movement, encounter."
    desc_quote: "\"You don't need any dance experience. Just comfortable clothing, curiosity and the willingness to try something new.\""
  projekte:
    section_label: "Current Projects"
    section_heading: "What's Happening Now"
    br_tag1: "Funded"
    br_tag2: "Beginners"
    br_heading: "Bewegungsrevolution"
    br_subtitle: "Contact Improvisation for everyone"
    br_p1: "A free 6-week programme for people with no movement experience at all. Funded by the Bewegungsrevolution initiative and ASVÖ — because access to artistic body practice shouldn't be a question of money or prior experience."
    br_p2: "Over six progressive sessions, you explore the foundations of Contact Improvisation: body awareness, sharing weight, falling and catching, touch as communication. The block culminates in a public showing — a lecture-performance in the We Just Met format, making the artistic research process visible for an audience."
    br_detail_date: "11 May – 15 June 2026"
    br_detail_cost: "Free of charge"
    br_detail_weeks: "6 weeks, 6 sessions"
    br_btn_anmelden: "Sign up now"
    br_btn_mehr: "Learn more"
  ausblick:
    section_label: "Outlook"
    section_heading: "What's Coming Next"
    section_intro: "Projects we're currently developing or planning. Something is taking shape here."
    wjm_label: "Performance / Lecture"
    wjm_heading: "We Just Met / First Encounter"
    wjm_subtitle: "Making the social physics of dance visible"
    wjm_p1: "A format where a narrator freezes the dancers during a Contact Improvisation session — and explains to the audience what is happening on a physical and social level. Gravity, trust, boundaries: the invisible physics of encounter becomes readable."
    wjm_p2: "Our attempt to make Contact Improvisation accessible to an audience that has never heard of it."
    bip_label: "Outdoor / Summer"
    bip_heading: "Moving in the Park"
    bip_subtitle: "Free Contact Improvisation in Graz parks"
    bip_p1: "Dance under the open sky — low-threshold, free and visible to all. Contact Improvisation out of the studio and into public space. Because movement shouldn't be a luxury."
    bip_btn: "bewegt-im-park.at"
  cta:
    label: "Invitation"
    heading: "Come by."
    text: "You don't need any experience, just comfortable clothing and curiosity. Every Monday, 17:45, Orpheumgasse 11, Graz."
    button: "Get in touch"

