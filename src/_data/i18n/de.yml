datenschutz:
  meta:
    title: "Datenschutz — Wild Care | Verein für soziale Praxis, Graz"
    description: "Datenschutzerklärung von Wild Care — Verein für Kontaktimprovisation und soziale Praxis in Graz."
  eyebrow: "Rechtliches"
  heading: "Datenschutzerklärung"
  s1_heading: "1. Allgemeine Information"
  s1_p1: "Der Schutz deiner persönlichen Daten ist uns ein besonderes Anliegen. Wir verarbeiten deine Daten ausschließlich auf Grundlage der gesetzlichen Bestimmungen (DSGVO, TKG 2003). In dieser Datenschutzerklärung informieren wir dich über die wichtigsten Aspekte der Datenverarbeitung auf unserer Website."
  s1_p2: |
    Verantwortliche Stelle: Wild Care — Wilde Fürsorge, Fabio Maria Gerhold, Froschaugasse 7, 8010 Graz<br>E-Mail: <a href="mailto:hello@wildcare.space">hello@wildcare.space</a>
  s2_heading: "2. Deine Rechte"
  s2_p1: "Du hast das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung, Datenübertragbarkeit, Widerruf und Widerspruch bezüglich deiner gespeicherten Daten. Wenn du der Meinung bist, dass die Verarbeitung deiner Daten gegen das Datenschutzrecht verstößt, kannst du dich bei der Aufsichtsbehörde beschweren. In Österreich ist das die Österreichische Datenschutzbehörde."
  s3_heading: "3. Datenerhebung auf unserer Website"
  s3_sub1_heading: "Server-Logfiles"
  s3_sub1_p1: "Der Hosting-Anbieter (GitHub Pages) erhebt und speichert automatisch Informationen in sogenannten Server-Logfiles, die dein Browser automatisch übermittelt:"
  s3_sub1_list:
    - "Browsertyp und -version"
    - "Verwendetes Betriebssystem"
    - "Referrer-URL"
    - "Hostname des zugreifenden Rechners"
    - "Uhrzeit der Serveranfrage"
    - "IP-Adresse"
  s3_sub1_p2: "Diese Daten werden nicht mit anderen Datenquellen zusammengeführt. Die Erfassung dieser Daten erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO."
  s3_sub2_heading: "Kontaktaufnahme"
  s3_sub2_p1: |
    Wenn du uns über das Formular auf der Website oder per E-Mail kontaktierst, werden die von dir angegebenen Daten (Name, E-Mail, Nachrichteninhalt) von uns zum Zweck der Bearbeitung der Anfrage gespeichert. Wir verwenden für das Kontaktformular den Dienst Formspree (Formspree, Inc., USA). Deine Daten werden dabei an Formspree übermittelt und dort gespeichert. Weitere Informationen: <a href="https://formspree.io/legal/privacy-policy/" target="_blank" rel="noopener">formspree.io/legal/privacy-policy</a>
  s3_sub2_p2: "Die Verarbeitung erfolgt auf Grundlage von Art. 6 Abs. 1 lit. b DSGVO (Vertragsanbahnung) bzw. Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse)."
  s4_heading: "4. Eingebundene Dienste"
  s4_sub1_heading: "Google Maps"
  s4_sub1_p1: |
    Auf unserer Kontaktseite verwenden wir Google Maps (Google Ireland Limited, Gordon House, Barrow Street, Dublin 4, Irland) zur Anzeige unseres Standorts. Beim Laden der Karte werden Daten an Google übertragen, darunter deine IP-Adresse. Dies erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse an der nutzerfreundlichen Darstellung unseres Standorts). Weitere Informationen: <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a>
  s4_sub2_heading: "Google Fonts"
  s4_sub2_p1: "Diese Website verwendet Google Fonts zur einheitlichen Darstellung von Schriftarten. Beim Aufruf einer Seite lädt dein Browser die benötigten Schriftarten und stellt dabei eine Verbindung zu den Servern von Google her. Google erhält dadurch Kenntnis darüber, dass unsere Website über deine IP-Adresse aufgerufen wurde. Dies erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO."
  s5_heading: "5. SSL/TLS-Verschlüsselung"
  s5_p1: >-
    Diese Seite nutzt aus Sicherheitsgründen eine SSL- bzw. TLS-Verschlüsselung.
    Eine verschlüsselte Verbindung erkennst du daran, dass die Adresszeile des Browsers
    von „http://" auf „https://" wechselt und an dem Schloss-Symbol in deiner Browserzeile.

team:
  meta:
    title: "Wild Care — Über uns | Team & Haltung"
    description: "Lerne das Team hinter Wild Care kennen. Verena Eidenberger und Fabio Maria Gerhold über Begegnung, Bewegung und soziale Praxis in Graz."
  hero:
    eyebrow: "Über uns"
    heading: "Begegnung<br>als Praxis."
    intro: "Wild Care ist ein Ort, an dem Kunst nicht an der Wand hängt, sondern zwischen Menschen passiert. Wir schaffen Räume für Bewegung, Berührung und ein anderes Miteinander — mitten in Graz."
  manifest:
    label: "Aus unserem Manifest"
    quote: "Wir kreieren temporäre, sichere Räume — Mikro-Utopien — in denen wir ein anderes Miteinander üben können. Nicht das fertige Kunstwerk zählt, sondern das, was zwischen uns passiert."
    attribution: "Wild Care — Verein für Kunst als lebendige, soziale Praxis"
  members_section:
    label: "Die Menschen dahinter"
    heading: "Unser Team"
  members:
    - name: "Verena Eidenberger"
      photo: "/assets/images/verena.jpg"
      role: "Tänzerin · Musik- und Tanzpädagogin"
      bio: "Verena bringt jahrelange Erfahrung in Tanz und Pädagogik mit. Ihr Zugang ist spielerisch und einladend — sie schafft Räume, in denen Menschen sich trauen, sich zu bewegen und zu begegnen. Ihre Rolle bei Wild Care entwickelt sich stetig weiter, so wie der Verein selbst."
    - name: "Fabio Maria Gerhold"
      photo: "/assets/images/fabio.jpg"
      role: "Tänzer · Yogalehrer · Gründer"
      bio: "Fabio verbindet Contact Improvisation, Yoga und Philosophie. Inspiriert von Martin Bubers Dialogphilosophie — der Idee, dass wir erst im echten Gegenüber zu uns selbst finden — erforscht er, wie Körperpraxis zu einer Haltung der Fürsorge und Aufmerksamkeit werden kann."
  quote_band:
    quote: '„Alles wirkliche Leben ist Begegnung."'
    attribution: "Martin Buber"
  philosophy:
    label: "Unsere Haltung"
    heading: "Worin wir wurzeln"
    p1: "Wild Care ist kein klassisches Tanzstudio und kein Therapieraum. Wir bewegen uns dort, wo Kunst, Körperarbeit und soziales Miteinander sich überschneiden."
    p2: "Unser Zugang ist einfach: Wenn wir lernen, unseren eigenen Körper achtsam wahrzunehmen und anderen mit Offenheit zu begegnen, verändert das nicht nur den Tanz — sondern auch, wie wir durch die Welt gehen."
  pillars:
    - heading: "Kunst als Beziehung"
      text: "Kunst entsteht nicht im stillen Kämmerlein, sondern zwischen Menschen. Was zählt, ist der Moment der Begegnung — nicht das Ergebnis."
    - heading: "Wissen durch den Körper"
      text: "Manche Dinge versteht man erst, wenn man sie spürt. Wir lernen durch Bewegung, Berührung und gemeinsames Tun — nicht nur durch Worte."
    - heading: "Fürsorge als Praxis"
      text: "Fürsorge ist mehr als ein Gefühl. Sie zeigt sich in konkretem Handeln: Grenzen wahren, Raum geben, aufeinander achten — im Tanz und im Alltag."
  cta:
    label: "Einladung"
    heading: "Lerne uns kennen."
    text: "Komm einfach vorbei — du brauchst keine Erfahrung, nur bequeme Kleidung und Neugier. Jeden Montag in Graz."
    button: "Kontakt aufnehmen"

